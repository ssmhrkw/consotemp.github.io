<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>共同住宅の音環境解説資料（コンソ20260413版）</title>
<style>
:root {
  --bg:            #f4f6f9;
  --surface:       #ffffff;
  --surface-2:     #f0f3f7;
  --border:        rgba(15,23,42,0.09);
  --border-md:     rgba(15,23,42,0.16);
  --text:          #111827;
  --muted:         #5c6978;
  --hint:          #9aaab8;
  --radius-lg:     12px;
  --radius-md:     8px;

  --teal-strong:   #1D9E75;
  --teal-bg:       #E1F5EE;
  --teal-text:     #085041;
  --teal-border:   #9FE1CB;

  --purple-strong: #7F77DD;
  --purple-bg:     #EEEDFE;
  --purple-text:   #3C3489;
  --purple-border: #CECBF6;
  --purple-dark:   #534AB7;

  --green-strong:  #1D9E75;
  --green-bg:      #EAF3DE;
  --green-text:    #27500A;
  --green-border:  #C0DD97;

  --red-strong:    #E24B4A;
  --red-bg:        #FCEBEB;
  --red-text:      #791F1F;
  --red-border:    #F7C1C1;

  --amber-strong:  #BA7517;
  --amber-bg:      #FAEEDA;
  --amber-text:    #633806;
  --amber-border:  #FAC775;

  --blue-strong:   #378ADD;
  --blue-bg:       #E6F1FB;
  --blue-text:     #0C447C;
  --blue-border:   #B5D4F4;

  --consumer-strong: #0F6E56;
  --consumer-bg:     #E1F5EE;
  --consumer-text:   #054035;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Yu Gothic UI","Yu Gothic",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  -webkit-font-smoothing:antialiased;
  padding:24px 20px 60px;
}
.wrap{max-width:1200px;margin:0 auto}
h1{font-size:21px;font-weight:700;letter-spacing:-.02em;margin-bottom:20px}

/* ── topic tabs ── */
.topic-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.t-btn{
  padding:6px 15px;border-radius:999px;
  border:1px solid var(--border-md);
  background:var(--surface);color:var(--muted);
  font-size:13px;font-weight:700;cursor:pointer;
  transition:all .14s;font-family:inherit;white-space:nowrap
}
.t-btn:hover{color:var(--text);border-color:var(--teal-strong)}
.t-btn.act-topic{background:#0F6E56;color:#E1F5EE;border-color:#0F6E56}

/* ── phase tabs ── */
.phase-wrap{
  display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;
  padding:8px 12px;
  background:var(--surface);
  border-radius:var(--radius-md);
  border:1px solid var(--border);
  align-items:center
}
.phase-lbl{font-size:10px;color:var(--hint);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-right:4px}

/* phase button — provider only (purple) */
.ph-btn{
  padding:5px 12px;border-radius:999px;
  border:1px solid var(--purple-border);
  background:var(--purple-bg);color:var(--purple-text);
  font-size:12px;font-weight:700;cursor:pointer;
  transition:all .14s;font-family:inherit;white-space:nowrap
}
.ph-btn:hover{border-color:var(--purple-strong)}
.ph-btn.act-phase{background:var(--purple-dark);color:#EEEDFE;border-color:var(--purple-dark)}

/* phase button — mixed (teal) */
.ph-btn.mixed{
  border-color:var(--teal-border);
  background:var(--teal-bg);color:var(--teal-text)
}
.ph-btn.mixed:hover{border-color:var(--teal-strong)}
.ph-btn.mixed.act-phase{background:#0F6E56;color:#E1F5EE;border-color:#0F6E56}

/* ── depth tabs ── */
.depth-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.depth-lbl{font-size:10px;color:var(--hint);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-right:4px}
.d-btn{
  padding:5px 12px;border-radius:999px;
  border:1px solid var(--border-md);
  background:var(--surface);color:var(--muted);
  font-size:12px;font-weight:700;cursor:pointer;
  transition:all .14s;font-family:inherit;white-space:nowrap
}
.d-btn:hover{color:var(--text)}
.d-btn.act-depth{background:var(--text);color:#fff;border-color:var(--text)}

/* ── legend ── */
.legend{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600}
.leg-dot{width:10px;height:10px;border-radius:3px}

.mode-note{
  margin-bottom:14px;
  padding:12px 14px;
  border-radius:var(--radius-md);
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-size:12px;
  line-height:1.7;
}
.mode-note strong{color:var(--text)}
.mode-note .mini{display:block;color:var(--hint);font-size:11px;margin-top:2px}

.tbl-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.05)}
.table-compact thead th:first-child{width:180px;min-width:160px}
.table-compact tbody td.row-label{width:180px;min-width:160px}

/* ── table ── */
table{width:100%;border-collapse:collapse;background:var(--surface)}

thead th{
  padding:11px 14px;
  text-align:left;
  font-size:12px;font-weight:700;
  background:var(--surface-2);
  border-bottom:1px solid var(--border-md);
  letter-spacing:.03em;
  white-space:nowrap
}
thead th:first-child{
  width:160px;min-width:140px;
  border-right:1px solid var(--border-md);
  color:var(--muted)
}
thead th.col-design{color:var(--purple-text)}
thead th.col-sales{color:var(--purple-text)}
thead th.col-consumer{color:var(--consumer-strong)}

.col-indicator{
  display:inline-block;width:8px;height:8px;border-radius:2px;
  margin-right:6px;vertical-align:middle
}
.col-indicator.design{background:var(--purple-strong)}
.col-indicator.sales{background:var(--purple-strong)}
.col-indicator.consumer{background:var(--consumer-strong)}

tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:#fafbfc}

tbody td{
  padding:13px 14px;
  vertical-align:top;
  font-size:13px;line-height:1.6;
}
tbody td.row-label{
  font-weight:700;font-size:13px;
  color:var(--text);
  border-right:1px solid var(--border-md);
  background:var(--surface-2);
  white-space:nowrap;
  vertical-align:middle
}
tbody td.col-design,
tbody td.col-sales{color:var(--muted)}
tbody td.col-consumer{color:var(--muted)}

/* ── cell content types ── */
.cell-stack{display:flex;flex-direction:column;gap:8px}
.cell-text{color:var(--muted);line-height:1.65;white-space:pre-line}

.do-list{display:flex;flex-direction:column;gap:8px}
.do-row{
  display:flex;
  gap:10px;
  align-items:center;
  font-size:13px;
  color:var(--muted);
  line-height:1.6;
}

.do-tag{
  flex:0 0 auto;
  margin-top:0;
  align-self:center;
}

.do-row > span:last-child{
  flex:1 1 auto;
  white-space:pre-line;
}

.pill{
  display:inline-flex;align-items:center;
  padding:2px 7px;border-radius:999px;
  font-size:10px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;
  border:1px solid transparent
}
.pill-do  {background:var(--green-bg); color:var(--green-text); border-color:var(--green-border)}
.pill-dont{background:var(--red-bg);   color:var(--red-text);   border-color:var(--red-border)}
.pill-amber{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-border)}

.panel{
  border-radius:var(--radius-md);
  padding:9px 11px;
  border:1px solid var(--border);
  background:var(--surface-2);
  font-size:13px;color:var(--muted);line-height:1.6;
  margin-bottom:6px
}
.panel:last-child{margin-bottom:0}
.panel.green {border-left:3px solid var(--green-strong); padding-left:9px}
.panel.purple{border-left:3px solid var(--purple-strong);padding-left:9px}
.panel.teal  {border-left:3px solid var(--teal-strong);  padding-left:9px}
.panel.amber {border-left:3px solid var(--amber-strong); padding-left:9px}
.panel.red   {border-left:3px solid var(--red-strong);   padding-left:9px}
.panel h5{margin:0 0 4px;font-size:11px;font-weight:700;color:var(--text)}
.panel p{margin:0;white-space:pre-line}
.panel.plain{border-left:3px solid var(--blue-border);padding-left:9px;background:#fbfcfe}
.panel.surface-card p{color:var(--text)}
.panel.action-card{padding:10px 11px}
.panel.action-card .do-row{margin:0}


.tool-row{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.tool-search{flex:1 1 320px}
.tool-search input{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border-md);
  background:var(--surface);
  color:var(--text);
  font:inherit;
}
.tool-check{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--surface);
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
}
.tool-status{
  margin-left:auto;
  font-size:12px;
  color:var(--hint);
}
.cite{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:4px;
  padding:0 6px;
  min-height:18px;
  border-radius:999px;
  border:1px solid var(--blue-border);
  background:var(--blue-bg);
  color:var(--blue-text);
  font-size:10px;
  font-weight:800;
  line-height:1.4;
  text-decoration:none;
  vertical-align:baseline;
}
.cite:hover{border-color:var(--blue-strong);background:#fff}
.source-wrap{
  margin-top:16px;
  padding:14px;
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  background:var(--surface);
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.source-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.source-head h2{font-size:15px;color:var(--text)}
.source-sub{font-size:11px;color:var(--hint)}
.source-list{display:flex;flex-direction:column;gap:8px}
.source-item{
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--surface-2);
}
.source-item:target{outline:2px solid var(--blue-strong);outline-offset:2px}
.source-code{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:38px;
  padding:0 8px;
  min-height:22px;
  margin-right:8px;
  border-radius:999px;
  background:var(--blue-bg);
  color:var(--blue-text);
  font-size:10px;
  font-weight:800;
  border:1px solid var(--blue-border);
}
.source-title{font-size:12px;font-weight:700;color:var(--text)}
.source-note{margin-top:4px;font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-line}
.source-link{display:inline-block;margin-top:6px;font-size:12px;color:var(--blue-text);text-decoration:none}
.source-link:hover{text-decoration:underline}
.empty-state td{color:var(--hint);font-style:italic}

.wip{color:var(--hint);font-style:italic;font-size:12px}

/* ── tooltip ── */
.term{border-bottom:1.5px dashed var(--border-md);cursor:help;position:relative;display:inline}
.tip{
  display:none;position:absolute;
  bottom:calc(100% + 4px);left:0;
  background:var(--surface);border:1px solid var(--border-md);
  border-radius:var(--radius-md);padding:7px 10px;
  font-size:12px;color:var(--muted);width:230px;z-index:30;
  line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.10)
}
.term:hover .tip{display:block}
</style>
</head>
<body>
<div class="wrap">
<h1>共同住宅の音環境解説資料（内部向け）</h1>
<!-- <div style="margin:-8px 0 16px;color:var(--hint);font-size:12px;line-height:1.6">Data編集メモ：<code>surface</code> / <code>body</code> / <code>s</code> はバッククォートで保持。VSCodeで改行すると、そのまま表示にも反映されます。</div> -->

<div class="topic-row" id="ttabs">
  <button class="t-btn act-topic" data-t="basics">基礎情報</button>
  <button class="t-btn" data-t="floor">床衝撃音</button>
</div>

<div class="phase-wrap" id="prow" style="display:none">
  <span class="phase-lbl">フェーズ</span>
  <button class="ph-btn act-phase" data-ph="plan">Phase 1</button>
  <button class="ph-btn" data-ph="design">Phase 2</button>
  <button class="ph-btn" data-ph="const">Phase 3</button>
  <button class="ph-btn mixed" data-ph="sales">Phase 4</button>
  <button class="ph-btn mixed" data-ph="living">Phase 5</button>
</div>

<div class="depth-row">
  <span class="depth-lbl"></span>
  <button class="d-btn act-depth" data-d="surface">概要</button>
  <button class="d-btn" data-d="tech">技術詳細</button>
  <button class="d-btn" data-d="action">Do / Do not</button>
</div>

<div class="legend" id="legend"></div>

<div class="mode-note" id="mode-note"></div>

<div class="tool-row">
  <div class="tool-search">
    <input id="row-filter" type="search" placeholder="項目名や本文を絞り込み" aria-label="項目名や本文を絞り込み"/>
  </div>
  <label class="tool-check"><input id="cite-only" type="checkbox"/> 引用ありのみ</label>
  <div class="tool-status" id="tool-status"></div>
</div>

<div class="tbl-wrap">
  <table id="main-table">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="source-wrap" id="source-wrap" hidden>
  <div class="source-head">
    <h2>引用・注記</h2>
    <div class="source-sub" id="source-sub">この表示で参照している出典</div>
  </div>
  <div class="source-list" id="source-list"></div>
</div>
</div>

<script>
const TERMS={
  "LH":"重量床衝撃音（子どもの飛び跳ね等）の遮音等級。数値が小さいほど性能が高い。",
  "LL":"軽量床衝撃音（物の落下・椅子引き摺り等）の遮音等級。数値が小さいほど性能が高い。",
  "スラブ":"鉄筋コンクリートの床板本体。厚いほど重量音に有利だが自重・コスト・階高とトレードオフ。",
  "二重床":"スラブ上に防振ゴム支持脚で浮かせた床。LL値に有効だがLH値は直貼りと同等以下になる場合がある。",
  "暗騒音":"室内の背景騒音レベル。高性能サッシ導入後など暗騒音が下がると生活音の相対的な聞こえ方が増す。",
  "ΔLL等級":"床仕上げ材の軽量床衝撃音低減性能の等級。ΔLL(I)-4等が一般的な防音フローリングの水準。",
};

const SOURCES = {
  N1: {
    title: "出典要設定：実験室値と実建物値の乖離に関する資料",
    note: "±10 dB程度の乖離という記述の裏付けをここに設定する。JIS解説、学会資料、技術資料などを紐づける想定。",
    url: ""
  },
  N2: {
    title: "出典要設定：測定条件の違いが結果に影響することに関する資料",
    note: "室容積、残響時間、測定位置などが結果に影響することの裏付けをここに設定する。",
    url: ""
  },
  P1: {
    title: "2024年度 一般財団法人日本建築センター(BCJ)研究助成:「共同住宅の音環境設計における性能水準設定の実態調査」報告書, 東京大学 大学院工学系研究科 佐久間哲也研究室, 2025年3月",
    note: `設計目標値がLH-50,竣工時許容値がLH-55程度の水準で設定されている事例が3/11社であったとのこと。
          また、設計目標値がLH-50,竣工時許容値がLH-50の場合が2社、設計目標値がLH-55,竣工時許容値がLH-55の場合が2社示されており、
          不動産協会に所属している協会員企業の中での設定水準が示されている。`,
    url: ""
  },
  P2: {
    title: "建築物の遮音性能基準と設計指針[第二版]」p95",
    note: `スラブ厚200（mm）の場合、スラブ面積12から40（㎡）まではLH-55相当の遮音等級。
          注：普通コンクリートスラブ、４周大梁支持、スパン比1.0-1.5程度の場合、床仕上げ構造・天井なしの場合を想定？
          `,
    url: ""
  },
  S1: {
    title: "ISO 19488:2020(E) Acoustics — Neighbour noise — Guidance for the management of noise in residential buildings",
    note: `「隣人の生活行動を特に制限しなくても、騒音が気になりにくい」や「隣人が周囲に気を配った生活をしていれば、大きな騒音トラブルは起きにくい」（いずれも意訳）という記述がある。`,
    url: ""
  },
};

const CITE_RE = /\[([A-Z]\d+)\]/g;

function wt(s){
  return String(s).replace(/LH値|LL値|スラブ|二重床|暗騒音|ΔLL等級/g,
    m=>`<span class="term">${m}<span class="tip">${TERMS[m]}</span></span>`);
}

function normalizeText(v){
  if(v == null) return "";
  if(Array.isArray(v)) return v.join("\n");
  return String(v);
}

function stripCites(text){
  return String(text || "")
    .replace(CITE_RE, "")
    .replace(/[ \t]{2,}/g, " ")
    .replace(/\n[ \t]+/g, "\n")
    .trim();
}

function renderRichText(text, { citations = false } = {}){
  const base = citations ? normalizeText(text) : stripCites(normalizeText(text));
  let html = wt(base);
  if(citations){
    html = html.replace(CITE_RE, (_, id) => {
      const meta = SOURCES[id];
      const label = meta ? id : `${id}?`;
      const title = meta ? `${id}: ${meta.title}` : `${id}: 出典未設定`;
      return `<a class="cite" href="#src-${id}" title="${title}">${label}</a>`;
    });
  }
  return html;
}

function collectSourceIdsFromText(text){
  const ids = [];
  normalizeText(text).replace(CITE_RE, (_, id) => {
    ids.push(id);
    return _;
  });
  return ids;
}

function canShowTechCitations(){
  return gd === "tech" && (ct === "basics" || PHASE_TECH_ONLY.has(cp));
}

function collectSourceIdsFromData(data, depth, columnKey){
  if(!data || depth !== "tech" || columnKey !== "design") return [];
  return (data.tech || []).flatMap(panel => collectSourceIdsFromText(panel.body));
}

function collectSourceIdsFromRow(row){
  if(!canShowTechCitations()) return [];
  return [...new Set(collectSourceIdsFromData(row.design, gd, "design"))];
}

function renderText(v, cls="cell-text"){
  const text = normalizeText(v);
  if(!text) return '<span class="wip">準備中</span>';
  return `<div class="${cls}">${renderRichText(text, { citations: false })}</div>`;
}

function isPanelArray(v){
  return Array.isArray(v)
    && v.length > 0
    && typeof v[0] === "object"
    && v[0] !== null
    && ("body" in v[0] || "head" in v[0]);
}

function renderSurfaceCard(v){
  if(!v) return '<span class="wip">準備中</span>';

  if(isPanelArray(v)){
    return `<div class="cell-stack">${v.map(p => `
      <div class="panel ${p.type || "plain"} surface-card">
        ${p.head ? `<h5>${renderRichText(p.head, { citations: false })}</h5>` : ""}
        <p>${renderRichText(normalizeText(p.body), { citations: false })}</p>
      </div>`).join("")}</div>`;
  }

  const text = normalizeText(v);
  if(!text) return '<span class="wip">準備中</span>';
  return `<div class="cell-stack"><div class="panel plain surface-card"><p>${renderRichText(text, { citations: false })}</p></div></div>`;
}

function renderActionCards(items){
  if(!items || !items.length) return '<span class="wip">準備中</span>';
  return `<div class="do-list">${items.map(i=>`
    <div class="panel ${i.do ? "green" : "red"} action-card">
      <div class="do-row">
        <span class="do-tag"><span class="pill ${i.do ? "pill-do" : "pill-dont"}">${i.do ? "Do" : "Do not"}</span></span>
        <span>${renderRichText(normalizeText(i.s), { citations: false })}</span>
      </div>
    </div>`).join("")}</div>`;
}

function renderCell(data, depth, columnKey){
  if(!data) return '<span class="wip">準備中</span>';
  if(depth === "surface") return renderSurfaceCard(data.surface);
  if(depth === "tech"){
    if(!data.tech || !data.tech.length) return '<span class="wip">準備中</span>';
    const useCitations = columnKey === "design" && canShowTechCitations();
    return `<div class="cell-stack">${data.tech.map(p => `
      <div class="panel ${p.type || "green"}">
        <h5>${renderRichText(p.head, { citations: false })}</h5>
        <p>${renderRichText(p.body, { citations: useCitations })}</p>
      </div>`).join("")}</div>`;
  }
  if(depth === "action") return renderActionCards(data.action);
  return "";
}

// ── STATE ──
let ct = "basics";
let cp = "plan";
let gd = "surface";
let rowFilter = "";
let citeOnly = false;

const PHASE_TECH_ONLY = new Set(["plan", "design", "const"]);
const PHASE_MIXED = new Set(["sales", "living"]);

function getRows(){
  if(ct === "basics") return D.basics;
  return D.floor[cp] || [];
}

function getColumnMode(){
  if(ct === "basics") return "three";
  if(PHASE_TECH_ONLY.has(cp)) return "tech";
  if(PHASE_MIXED.has(cp)) return "mixed";
  return "three";
}

function getColumns(){
  const mode = getColumnMode();
  if(mode === "tech"){
    return [{ key: "design", label: "設計・技術", headerClass: "col-design", cellClass: "col-design", indicator: "design" }];
  }
  if(mode === "mixed"){
    return [
      { key: "sales", label: "営業", headerClass: "col-sales", cellClass: "col-sales", indicator: "sales" },
      { key: "consumer", label: "消費者", headerClass: "col-consumer", cellClass: "col-consumer", indicator: "consumer" },
    ];
  }
  return [
    { key: "design", label: "設計・技術", headerClass: "col-design", cellClass: "col-design", indicator: "design" },
    { key: "sales", label: "営業", headerClass: "col-sales", cellClass: "col-sales", indicator: "sales" },
    { key: "consumer", label: "消費者", headerClass: "col-consumer", cellClass: "col-consumer", indicator: "consumer" },
  ];
}

function getRowSearchText(row){
  return [
    row.label,
    row.design?.surface,
    ...(row.design?.tech || []).map(x => x.body),
    ...(row.design?.action || []).map(x => x.s),
    row.sales?.surface,
    ...(row.sales?.tech || []).map(x => x.body),
    ...(row.sales?.action || []).map(x => x.s),
    row.consumer?.surface,
    ...(row.consumer?.tech || []).map(x => x.body),
    ...(row.consumer?.action || []).map(x => x.s),
  ].filter(Boolean).join("\n").toLowerCase();
}

function filterRows(rows){
  return rows.filter(row => {
    if(rowFilter && !getRowSearchText(row).includes(rowFilter)) return false;
    if(citeOnly && !collectSourceIdsFromRow(row).length) return false;
    return true;
  });
}

function renderSourcePanel(rows){
  if(!canShowTechCitations()){
    dom.sourceWrap.hidden = true;
    dom.sourceList.innerHTML = "";
    dom.sourceSub.textContent = "技術詳細で参照している出典";
    return;
  }

  const ids = [...new Set(rows.flatMap(collectSourceIdsFromRow))];
  if(!ids.length){
    dom.sourceWrap.hidden = true;
    dom.sourceList.innerHTML = "";
    dom.sourceSub.textContent = "技術詳細で参照している出典";
    return;
  }

  dom.sourceWrap.hidden = false;
  dom.sourceSub.textContent = `技術詳細で ${ids.length} 件の引用・注記を表示中`;
  dom.sourceList.innerHTML = ids.map(id => {
    const s = SOURCES[id] || { title: "出典未設定", note: "SOURCES に追加してください。", url: "" };
    return `<div class="source-item" id="src-${id}">
      <div class="source-title"><span class="source-code">${id}</span>${s.title}</div>
      ${s.note ? `<div class="source-note">${s.note}</div>` : ""}
      ${s.url ? `<a class="source-link" href="${s.url}" target="_blank" rel="noopener noreferrer">参照先を開く</a>` : ""}
    </div>`;
  }).join("");
}

function renderHead(){
  const cols = getColumns();
  dom.thead.innerHTML = `<tr><th>項目</th>${cols.map(c => `<th class="${c.headerClass}"><span class="col-indicator ${c.indicator}"></span>${c.label}</th>`).join("")}</tr>`;
  dom.mainTable.classList.toggle("table-compact", getColumnMode() !== "three");
}

function renderLegendAndNote(){
  const mode = getColumnMode();
  if(mode === "tech"){
    dom.legend.innerHTML = `<span class="leg"><span class="leg-dot" style="background:var(--purple-strong)"></span>このフェーズでは技術者向けの項目のみを表示</span>`;
    dom.modeNote.innerHTML = `<strong>いま見ているのは技術者向けの整理です。</strong><span class="mini">要求性能、選定条件、施工確認の骨子だけを表に残し、詳細な根拠や測定方法は後段で追加できる構成にしています。</span>`;
    return;
  }
  if(mode === "mixed"){
    dom.legend.innerHTML = `<span class="leg"><span class="leg-dot" style="background:var(--teal-strong)"></span>このフェーズでは営業と消費者の関係を表示</span>`;
    dom.modeNote.innerHTML = `<strong>いま見ているのは説明と受け取り方の整理です。</strong><span class="mini">営業はどう伝えるか、消費者はどう理解するかに絞って表示しています。</span>`;
    return;
  }
  dom.legend.innerHTML = `
    <span class="leg"><span class="leg-dot" style="background:var(--purple-strong)"></span>設計・技術</span>
    <span class="leg"><span class="leg-dot" style="background:var(--purple-strong)"></span>営業</span>
    <span class="leg"><span class="leg-dot" style="background:var(--consumer-strong)"></span>消費者</span>`;
  dom.modeNote.innerHTML = `<strong>基礎編は3者「設計者」「営業」「消費者」の見方を並べて表示します。</strong><span class="mini">前提の違い、説明の違い、受け取り方の違いを同じ表で比較できるようにしています。</span>`;
}

function syncToolControls(){
  const canFilterByCites = canShowTechCitations();
  dom.citeOnly.parentElement.style.display = canFilterByCites ? "inline-flex" : "none";
  if(!canFilterByCites){
    citeOnly = false;
    dom.citeOnly.checked = false;
  }
}

function render(){
  renderHead();
  renderLegendAndNote();
  syncToolControls();

  const cols = getColumns();
  const allRows = getRows();
  const rows = filterRows(allRows);
  dom.tbody.innerHTML = "";

  if(!rows.length){
    const tr = document.createElement("tr");
    tr.className = "empty-state";
    tr.innerHTML = `<td class="row-label">該当なし</td><td colspan="${cols.length}">条件に一致する項目がありません。</td>`;
    dom.tbody.appendChild(tr);
  } else {
    rows.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="row-label">${row.label}</td>
        ${cols.map(c => `<td class="${c.cellClass}">${renderCell(row[c.key], gd, c.key)}</td>`).join("")}`;
      dom.tbody.appendChild(tr);
    });
  }

  dom.toolStatus.textContent = `${rows.length} / ${allRows.length} 件`;
  renderSourcePanel(rows);
}

// ── EVENTS ──
const dom = {
  topicTabs: document.getElementById("ttabs"),
  phaseRow: document.getElementById("prow"),
  depthRow: document.querySelector(".depth-row"),
  mainTable: document.getElementById("main-table"),
  thead: document.getElementById("thead"),
  tbody: document.getElementById("tbody"),
  legend: document.getElementById("legend"),
  modeNote: document.getElementById("mode-note"),
  rowFilter: document.getElementById("row-filter"),
  citeOnly: document.getElementById("cite-only"),
  toolStatus: document.getElementById("tool-status"),
  sourceWrap: document.getElementById("source-wrap"),
  sourceList: document.getElementById("source-list"),
  sourceSub: document.getElementById("source-sub"),
};

function syncTopicButtons(){
  document.querySelectorAll("[data-t]").forEach(el => el.classList.toggle("act-topic", el.dataset.t === ct));
}

function syncPhaseButtons(){
  document.querySelectorAll("[data-ph]").forEach(el => el.classList.toggle("act-phase", el.dataset.ph === cp));
}

function syncDepthButtons(){
  document.querySelectorAll("[data-d]").forEach(el => el.classList.toggle("act-depth", el.dataset.d === gd));
}

function syncPhaseRow(){
  dom.phaseRow.style.display = ct === "floor" ? "flex" : "none";
}

function setTopic(topic){
  ct = topic;
  if(ct === "floor" && !D.floor[cp]) cp = "plan";
  syncTopicButtons();
  syncPhaseButtons();
  syncPhaseRow();
  render();
}

function setPhase(phase){
  cp = phase;
  syncPhaseButtons();
  render();
}

function setDepth(depth){
  gd = depth;
  syncDepthButtons();
  render();
}

dom.topicTabs.addEventListener("click", e => {
  const button = e.target.closest("[data-t]");
  if(!button || button.dataset.t === ct) return;
  setTopic(button.dataset.t);
});

dom.phaseRow.addEventListener("click", e => {
  const button = e.target.closest("[data-ph]");
  if(!button || button.dataset.ph === cp) return;
  setPhase(button.dataset.ph);
});

dom.depthRow.addEventListener("click", e => {
  const button = e.target.closest("[data-d]");
  if(!button || button.dataset.d === gd) return;
  setDepth(button.dataset.d);
});

dom.rowFilter.addEventListener("input", e => {
  rowFilter = e.target.value.trim().toLowerCase();
  render();
});

dom.citeOnly.addEventListener("change", e => {
  citeOnly = e.target.checked;
  render();
});

syncTopicButtons();
syncPhaseButtons();
syncDepthButtons();
syncPhaseRow();
render();
</script>
</body>
</html>
